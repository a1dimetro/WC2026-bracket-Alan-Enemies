name: Update leaderboard

on:
  # Run daily at 07:00 Pacific Time (which is 14:00 UTC during DST or 15:00 UTC otherwise).
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Run leaderboard update script
        env:
          BRACKETS_DIR: brackets
          RESULTS_FILE: results.csv
          OUTPUT_FILE: leaderboard.json
        run: |
          python scripts/update_leaderboard.py

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          add: 'leaderboard.json'
          message: 'chore: update leaderboard data (automated)'
          author_name: GitHub Actions
          author_email: actions@github.com
          push: true